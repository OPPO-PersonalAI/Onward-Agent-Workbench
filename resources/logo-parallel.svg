<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>

    <linearGradient id="brightPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#d8b4fe"/>
    </linearGradient>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a12"/>
    </linearGradient>

    <filter id="agentGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="trackGlow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <g opacity="0.3">
    <line x1="80" y1="140" x2="432" y2="140" stroke="#a855f7" stroke-width="3" stroke-linecap="round"/>
    <line x1="80" y1="210" x2="432" y2="210" stroke="#a855f7" stroke-width="3" stroke-linecap="round"/>
    <line x1="80" y1="302" x2="432" y2="302" stroke="#a855f7" stroke-width="3" stroke-linecap="round"/>
    <line x1="80" y1="372" x2="432" y2="372" stroke="#a855f7" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g filter="url(#agentGlow)">
    <circle cx="380" cy="140" r="20" fill="url(#brightPurple)"/>
    <line x1="80" y1="140" x2="360" y2="140" stroke="url(#purple)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g filter="url(#agentGlow)">
    <circle cx="320" cy="210" r="20" fill="url(#brightPurple)"/>
    <line x1="80" y1="210" x2="300" y2="210" stroke="url(#purple)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g filter="url(#agentGlow)">
    <circle cx="350" cy="302" r="20" fill="url(#brightPurple)"/>
    <line x1="80" y1="302" x2="330" y2="302" stroke="url(#purple)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g filter="url(#agentGlow)">
    <circle cx="290" cy="372" r="20" fill="url(#brightPurple)"/>
    <line x1="80" y1="372" x2="270" y2="372" stroke="url(#purple)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <path d="M 420 200 L 460 256 L 420 312"
        fill="none"
        stroke="url(#brightPurple)"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.8"/>
</svg>
