<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>

    <linearGradient id="darkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16162a"/>
      <stop offset="100%" style="stop-color:#0a0a10"/>
    </linearGradient>

    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(50 50) scale(0.8046875)">
    <rect width="512" height="512" rx="108" ry="108" fill="url(#darkBg)"/>

    <g filter="url(#glowEffect)">
      <path d="M 80 120 Q 200 120, 280 200 Q 340 260, 400 256"
            fill="none"
            stroke="url(#purpleGrad)"
            stroke-width="12"
            stroke-linecap="round"
            opacity="0.6"/>

      <path d="M 80 190 Q 180 190, 260 220 Q 340 250, 400 256"
            fill="none"
            stroke="url(#purpleGrad)"
            stroke-width="14"
            stroke-linecap="round"
            opacity="0.8"/>

      <path d="M 80 256 L 400 256"
            fill="none"
            stroke="url(#purpleGrad)"
            stroke-width="16"
            stroke-linecap="round"/>

      <path d="M 80 322 Q 180 322, 260 292 Q 340 262, 400 256"
            fill="none"
            stroke="url(#purpleGrad)"
            stroke-width="14"
            stroke-linecap="round"
            opacity="0.8"/>

      <path d="M 80 392 Q 200 392, 280 312 Q 340 252, 400 256"
            fill="none"
            stroke="url(#purpleGrad)"
            stroke-width="12"
            stroke-linecap="round"
            opacity="0.6"/>
    </g>

    <g filter="url(#glowEffect)">
      <circle cx="400" cy="256" r="24" fill="#c084fc"/>
      <circle cx="400" cy="256" r="12" fill="#ffffff" opacity="0.6"/>
    </g>

    <path d="M 430 256 L 470 256 M 455 235 L 475 256 L 455 277"
          fill="none"
          stroke="#c084fc"
          stroke-width="10"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.9"/>

    <g fill="#a855f7">
      <circle cx="80" cy="120" r="10" opacity="0.6"/>
      <circle cx="80" cy="190" r="10" opacity="0.8"/>
      <circle cx="80" cy="256" r="12"/>
      <circle cx="80" cy="322" r="10" opacity="0.8"/>
      <circle cx="80" cy="392" r="10" opacity="0.6"/>
    </g>
  </g>
</svg>
