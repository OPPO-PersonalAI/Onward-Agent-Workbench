name: Daily Build

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest    # Apple Silicon (arm64)
            arch: arm64
            release_os: macos
          - os: macos-15-intel  # Intel (x64)
            arch: x64
            release_os: macos
          # Windows and Linux - uncomment when ready:
          # - os: windows-latest
          #   arch: x64
          #   release_os: windows
          # - os: ubuntu-latest
          #   arch: x64
          #   release_os: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store-path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store-path }}
          key: ${{ runner.os }}-${{ matrix.arch }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-pnpm-

      - name: Cache Electron and electron-builder
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-${{ matrix.arch }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-electron-

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Extract tag name
        id: tag
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build release
        env:
          ONWARD_TAG: ${{ steps.tag.outputs.version }}
          ONWARD_RELEASE_OS: ${{ matrix.release_os }}
        run: rm -rf out release && pnpm dist:release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ runner.os }}-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Generate update manifests
        env:
          ONWARD_GITHUB_REPOSITORY: ${{ github.repository }}
          ONWARD_RELEASE_TAG: ${{ github.ref_name }}
          ONWARD_ARTIFACT_DIR: dist-artifacts
          ONWARD_MANIFEST_DIR: update-manifests
        run: node scripts/generate-update-manifest.js

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Daily Build ${{ github.ref_name }}
          files: |
            dist-artifacts/*.dmg
            dist-artifacts/*.zip
          draft: false
          prerelease: true
          make_latest: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish update manifests to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add gh-pages-worktree origin/gh-pages
          else
            git worktree add --detach gh-pages-worktree
            (
              cd gh-pages-worktree
              git checkout --orphan gh-pages
              git rm -rf . >/dev/null 2>&1 || true
            )
          fi
          mkdir -p gh-pages-worktree/updates
          rsync -a update-manifests/ gh-pages-worktree/updates/
          touch gh-pages-worktree/.nojekyll
          (
            cd gh-pages-worktree
            git add updates .nojekyll
            git commit -m "Update manifests for ${RELEASE_TAG}" || true
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
          )
