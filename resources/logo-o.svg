<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d8b4fe"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6b21a8"/>
    </linearGradient>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c2e"/>
      <stop offset="100%" style="stop-color:#0d0d15"/>
    </linearGradient>

    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <circle cx="256" cy="256" r="160"
          fill="none"
          stroke="url(#mainGrad)"
          stroke-width="48"
          stroke-linecap="round"/>

  <circle cx="256" cy="256" r="160"
          fill="none"
          stroke="url(#bg)"
          stroke-width="52"
          stroke-dasharray="0 600 200 1000"
          stroke-dashoffset="-80"
          transform="rotate(-30 256 256)"/>

  <path d="M 370 256
           L 430 256
           L 430 210
           L 490 256
           L 430 302
           L 430 256 Z"
        fill="url(#mainGrad)"/>

  <g fill="#a855f7" opacity="0.6">
    <circle cx="200" cy="220" r="12"/>
    <circle cx="200" cy="256" r="12"/>
    <circle cx="200" cy="292" r="12"/>
  </g>

  <path d="M 380 256 L 450 256"
        stroke="#ffffff"
        stroke-width="4"
        stroke-linecap="round"
        opacity="0.3"/>
</svg>
