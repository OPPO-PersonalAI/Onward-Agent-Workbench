<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6b21a8"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#d8b4fe"/>
    </linearGradient>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18182a"/>
      <stop offset="100%" style="stop-color:#0c0c14"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="speed">
      <feGaussianBlur stdDeviation="3" in="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>

  <g opacity="0.15" filter="url(#speed)">
    <line x1="40" y1="130" x2="200" y2="130" stroke="#a855f7" stroke-width="4"/>
    <line x1="60" y1="180" x2="180" y2="180" stroke="#a855f7" stroke-width="3"/>
    <line x1="40" y1="256" x2="160" y2="256" stroke="#a855f7" stroke-width="4"/>
    <line x1="60" y1="332" x2="180" y2="332" stroke="#a855f7" stroke-width="3"/>
    <line x1="40" y1="382" x2="200" y2="382" stroke="#a855f7" stroke-width="4"/>
  </g>

  <g filter="url(#glow)">
    <path d="M 140 130 L 340 130 L 340 105 L 400 130 L 340 155 L 340 130"
          fill="url(#grad)" opacity="0.6"/>

    <path d="M 120 193 L 300 193 L 300 168 L 360 193 L 300 218 L 300 193"
          fill="url(#grad)" opacity="0.75"/>

    <path d="M 100 256 L 340 256 L 340 216 L 430 256 L 340 296 L 340 256"
          fill="url(#grad)"/>

    <path d="M 120 319 L 300 319 L 300 294 L 360 319 L 300 344 L 300 319"
          fill="url(#grad)" opacity="0.75"/>

    <path d="M 140 382 L 340 382 L 340 357 L 400 382 L 340 407 L 340 382"
          fill="url(#grad)" opacity="0.6"/>
  </g>

  <g opacity="0.4">
    <line x1="150" y1="256" x2="320" y2="256" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
