<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="mainPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6b21a8"/>
      <stop offset="40%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#d8b4fe"/>
    </linearGradient>

    <linearGradient id="background" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1625"/>
      <stop offset="100%" style="stop-color:#0d0a12"/>
    </linearGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" ry="108" fill="url(#background)"/>

  <rect x="8" y="8" width="496" height="496" rx="104" ry="104"
        fill="none" stroke="#a855f7" stroke-width="1" opacity="0.2"/>

  <g filter="url(#softGlow)">

    <g opacity="0.5">
      <circle cx="100" cy="140" r="14" fill="#a855f7"/>
      <rect x="114" y="134" width="180" height="12" rx="6" fill="url(#mainPurple)"/>
      <path d="M 294 128 L 330 140 L 294 152 Z" fill="#c084fc"/>
    </g>

    <g opacity="0.7">
      <circle cx="100" cy="210" r="16" fill="#a855f7"/>
      <rect x="116" y="202" width="220" height="16" rx="8" fill="url(#mainPurple)"/>
      <path d="M 336 192 L 380 210 L 336 228 Z" fill="#c084fc"/>
    </g>

    <g>
      <circle cx="100" cy="290" r="20" fill="#a855f7"/>
      <rect x="120" y="278" width="260" height="24" rx="12" fill="url(#mainPurple)"/>
      <path d="M 380 262 L 440 290 L 380 318 Z" fill="#d8b4fe"/>
      <rect x="140" y="286" width="200" height="8" rx="4" fill="#ffffff" opacity="0.3"/>
    </g>

    <g opacity="0.7">
      <circle cx="100" cy="370" r="16" fill="#a855f7"/>
      <rect x="116" y="362" width="220" height="16" rx="8" fill="url(#mainPurple)"/>
      <path d="M 336 352 L 380 370 L 336 388 Z" fill="#c084fc"/>
    </g>

    <g opacity="0.5">
      <circle cx="100" cy="440" r="14" fill="#a855f7"/>
      <rect x="114" y="434" width="180" height="12" rx="6" fill="url(#mainPurple)"/>
      <path d="M 294 428 L 330 440 L 294 452 Z" fill="#c084fc"/>
    </g>

  </g>

  <g opacity="0.15">
    <line x1="450" y1="180" x2="490" y2="180" stroke="#a855f7" stroke-width="4" stroke-linecap="round"/>
    <line x1="460" y1="230" x2="500" y2="230" stroke="#a855f7" stroke-width="4" stroke-linecap="round"/>
    <line x1="450" y1="350" x2="490" y2="350" stroke="#a855f7" stroke-width="4" stroke-linecap="round"/>
    <line x1="460" y1="400" x2="500" y2="400" stroke="#a855f7" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
